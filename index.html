<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila do SAC — Plantão Noturno</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0d17; --bg-glow: radial-gradient(circle at 15% 0%, #1a1440 0%, #0b0d17 45%);
    --card:#151830; --card2:#1d2140; --line:#2b2f56;
    --text:#eef0fb; --muted:#8b8fb8;
    --ok:#2dd4bf; --ok-dim:#0f2e2c; --paused:#f5a623; --off:#565b82;
    --accent:#7c5cff; --accent-soft:#241d55; --danger:#f0577a;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-body:'Inter', system-ui, sans-serif;
    --font-mono:'IBM Plex Mono', monospace;
    --radius:16px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:var(--font-body);
    background:var(--bg-glow), var(--bg); background-attachment:fixed;
    color:var(--text); padding:28px 20px;
    -webkit-font-smoothing:antialiased;
    min-height:100vh; display:flex; align-items:center; justify-content:center;
  }
  h1,h2{font-family:var(--font-display); margin:0;}
  button{font-family:var(--font-body);}

  #telaLogin{
    max-width:360px; width:100%; margin:0; background:var(--card);
    border:1px solid var(--line); border-radius:var(--radius); padding:32px;
  }
  #telaLogin .eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.14em;
    text-transform:uppercase; color:var(--accent); margin-bottom:6px; display:block;
  }
  #telaLogin h1{font-size:22px; margin-bottom:24px;}
  #telaLogin input{
    width:100%; padding:12px 13px; margin-bottom:10px; border-radius:10px;
    border:1px solid var(--line); background:var(--card2); color:var(--text); font-size:14px;
    outline:none; transition:border-color .15s;
  }
  #telaLogin input:focus{border-color:var(--accent);}
  #telaLogin button:not(.icon-btn){
    width:100%; padding:12px; font-size:14px; font-weight:600; background:var(--accent);
    border:none; border-radius:10px; color:#fff; cursor:pointer; margin-top:4px;
    transition:filter .15s;
  }
  #telaLogin button:not(.icon-btn):hover{filter:brightness(1.12);}
  #erroLogin{color:var(--danger); font-size:12px; margin-top:10px; min-height:16px;}
  .icon-btn{
    position:absolute; right:4px; top:4px; background:transparent; border:none;
    padding:6px 8px; font-size:16px; cursor:pointer; color:var(--muted);
  }

  #app{max-width:640px; width:100%; margin:0 auto;}
  .topbar{
    display:flex; justify-content:space-between; align-items:flex-end;
    margin-bottom:20px; padding-bottom:18px; border-bottom:1px solid var(--line);
  }
  .brand-eyebrow{
    font-family:var(--font-mono); font-size:11px; letter-spacing:.16em;
    text-transform:uppercase; color:var(--accent); display:block; margin-bottom:4px;
  }
  .topbar h1{font-size:24px;}
  .session{display:flex; align-items:center; gap:12px;}
  .session span{color:var(--muted); font-size:13px; font-family:var(--font-mono);}
  #btnSair{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:8px 14px; border-radius:8px; font-size:12px; cursor:pointer; transition:.15s;
  }
  #btnSair:hover{border-color:var(--danger); color:var(--danger);}

  #minhaVez{
    display:flex; align-items:center; gap:10px;
    background:var(--ok-dim); border:1px solid var(--ok); color:var(--ok);
    font-weight:600; padding:13px 18px; border-radius:12px; margin-bottom:20px; font-size:14px;
  }
  .passar-vez-btn{
    margin-left:auto; background:transparent; border:1px solid var(--ok); color:var(--ok);
    padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; font-weight:600;
  }
  .passar-vez-btn:hover{background:var(--ok); color:#08211a;}
  .ticket-setas{display:flex; flex-direction:column; gap:2px;}
  .ticket-setas button{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    width:22px; height:18px; font-size:10px; padding:0; border-radius:4px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
  }
  .ticket-setas button:hover{border-color:var(--accent); color:var(--accent);}
  #painelAdmin{margin-top:18px;}
  .admin-total-row{
    display:flex; justify-content:space-between; align-items:center; font-size:13px;
    padding:8px 2px; border-bottom:1px solid var(--line);
  }
  .admin-dia{
    font-family:var(--font-mono); font-size:11px; color:var(--accent); margin:14px 0 4px;
    text-transform:uppercase; letter-spacing:.06em;
  }
  .minha-vez-dot{
    width:9px; height:9px; border-radius:50%; background:var(--ok); flex-shrink:0;
    animation:pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(45,212,191,.55);}
    50%{box-shadow:0 0 0 7px rgba(45,212,191,0);}
  }

  .grid{display:grid; grid-template-columns: 1fr; gap:18px;}

  .card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:20px;}
  .card-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;}
  .card-head h2{
    font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); font-weight:600;
  }

  .chamar-btn{
    width:100%; padding:15px; font-size:14px; font-weight:600; color:#fff;
    background:linear-gradient(135deg, var(--accent), #5b3df0);
    border:none; border-radius:12px; margin-bottom:18px; cursor:pointer;
    transition:filter .15s, transform .1s;
  }
  .chamar-btn:hover:not(:disabled){filter:brightness(1.1);}
  .chamar-btn:active:not(:disabled){transform:scale(.99);}
  .chamar-btn:disabled{opacity:.35; cursor:not-allowed;}

  .lista-fila{display:flex; flex-direction:column; gap:8px;}
  .ticket{
    display:flex; align-items:center; gap:12px;
    background:var(--card2); border:1px solid transparent; border-radius:12px; padding:11px 14px;
    transition:border-color .2s, box-shadow .2s;
  }
  .ticket.destaque{
    border-color:var(--ok); box-shadow:0 0 0 1px var(--ok), 0 0 18px -4px rgba(45,212,191,.5);
  }
  .ticket-pos{
    font-family:var(--font-mono); font-size:13px; color:var(--muted); width:20px; flex-shrink:0;
  }
  .avatar{
    width:34px; height:34px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-weight:700; font-size:13px; color:#fff;
    background: hsl(var(--hue) 65% 42%);
  }
  .ticket-info{flex:1; min-width:0;}
  .ticket-name{font-weight:600; font-size:14px;}
  .ticket-meta{color:var(--muted); font-size:12px; margin-top:2px; display:flex; align-items:center; gap:6px;}
  .status-pill{
    font-size:10px; font-weight:600; text-transform:uppercase; letter-spacing:.04em;
    padding:2px 7px; border-radius:20px;
  }
  .disponivel .status-pill{background:var(--ok-dim); color:var(--ok);}
  .offline .status-pill{background:#23264a; color:var(--off);}
  .ticket button{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:7px 11px; border-radius:8px; font-size:11px; cursor:pointer; flex-shrink:0;
    transition:.15s;
  }
  .ticket button:hover{border-color:var(--accent); color:var(--accent);}

  .historico{max-height:220px; overflow-y:auto; display:flex; flex-direction:column; gap:2px;}
  .historico-item{
    font-size:12.5px; color:var(--text); padding:9px 2px; border-bottom:1px solid var(--line);
    display:flex; justify-content:space-between; gap:10px;
  }
  .historico-item b{color:var(--text);}
  .historico-item .hora{font-family:var(--font-mono); color:var(--muted); font-size:11px; flex-shrink:0;}
  .historico-vazio{color:var(--muted); font-size:12.5px; padding:8px 2px;}

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background:var(--card2); border:1px solid var(--line); padding:11px 20px; border-radius:10px;
    font-size:13px; display:none; box-shadow:0 8px 24px rgba(0,0,0,.4); z-index:10;
  }

  @media (prefers-reduced-motion: reduce){
    .minha-vez-dot{animation:none;}
  }

  /* ---------- Configurações (tema/cor) ---------- */
  #btnConfig{
    background:transparent; border:1px solid var(--line); color:var(--muted);
    padding:8px 11px; border-radius:8px; font-size:13px; cursor:pointer; transition:.15s;
  }
  #btnConfig:hover{border-color:var(--accent); color:var(--accent);}
  .painel-config{
    background:var(--card); border:1px solid var(--line); border-radius:12px;
    padding:16px 18px; margin-bottom:18px; display:flex; flex-direction:column; gap:12px;
  }
  .config-linha{display:flex; align-items:center; justify-content:space-between; font-size:13px; color:var(--muted);}
  .tema-btn{
    background:var(--card2); border:1px solid var(--line); color:var(--text);
    padding:7px 12px; border-radius:8px; font-size:12px; cursor:pointer; margin-left:6px;
  }
  .tema-btn.ativo{border-color:var(--accent); color:var(--accent);}
  .cores-config{display:flex; gap:8px;}
  .cor-swatch{
    width:22px; height:22px; border-radius:50%; cursor:pointer; border:2px solid transparent;
    padding:0;
  }
  .cor-swatch.ativa{border-color:var(--text);}

  /* ---------- Tema claro ---------- */
  body.tema-claro{
    --bg:#f4f5fb; --bg-glow: radial-gradient(circle at 15% 0%, #e7e4ff 0%, #f4f5fb 45%);
    --card:#ffffff; --card2:#f2f3fa; --line:#e2e4f0;
    --text:#181a2c; --muted:#666c93;
    --ok-dim:#e1faf5; --off:#a2a6c4;
  }
</style>
</head>
<body>

<div id="telaLogin">
  <span class="eyebrow">Plantão noturno</span>
  <h1>Fila do SAC</h1>
  <input type="email" id="loginEmail" placeholder="Email" autocomplete="username" autocapitalize="off">
  <div style="position:relative;">
    <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password" autocapitalize="off" style="padding-right:40px;">
    <button type="button" id="btnMostrarSenha" class="icon-btn">👁</button>
  </div>
  <button id="btnEntrar">Entrar</button>
  <div id="erroLogin"></div>
</div>

<div id="app" style="display:none;">

  <div class="topbar">
    <div>
      <span class="brand-eyebrow">Plantão noturno</span>
      <h1>Fila do SAC</h1>
    </div>
    <div class="session">
      <span id="usuarioLogado"></span>
      <button id="btnConfig" title="Personalizar">⚙</button>
      <button id="btnSair">Sair</button>
    </div>
  </div>

  <div id="painelConfig" class="painel-config" style="display:none;">
    <div class="config-linha">
      <span>Tema</span>
      <div>
        <button id="btnTemaClaro" class="tema-btn">☀ Claro</button>
        <button id="btnTemaEscuro" class="tema-btn">🌙 Escuro</button>
      </div>
    </div>
    <div class="config-linha">
      <span>Cor</span>
      <div id="coresConfig" class="cores-config"></div>
    </div>
  </div>

  <div id="minhaVez" style="display:none;">
    <span class="minha-vez-dot"></span>
    <span>Agora é a sua vez</span>
    <button id="btnPassarVez" class="passar-vez-btn">Passar a vez</button>
  </div>

  <div class="grid">
    <section class="card">
      <div class="card-head"><h2>Ordem da fila</h2></div>
      <button class="chamar-btn" id="btnChamar">Chamar próximo disponível</button>
      <div id="listaFila" class="lista-fila"></div>
    </section>

    <section class="card">
      <div class="card-head"><h2>Hoje</h2></div>
      <div class="historico" id="historico"></div>
    </section>
  </div>

  <section class="card" id="painelAdmin" style="display:none;">
    <div class="card-head"><h2>Painel administrativo — todos os resultados</h2></div>
    <div id="statsAdmin"></div>
  </section>

  <div class="toast" id="toast"></div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getDatabase, ref, onValue, get, update, push,
    runTransaction, serverTimestamp, onDisconnect
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHNeQ-m8aRgsldPZYq55YMmE5FOCPGFBU",
    authDomain: "fila-noturno-sac.firebaseapp.com",
    databaseURL: "https://fila-noturno-sac-default-rtdb.firebaseio.com",
    projectId: "fila-noturno-sac",
  };

  const CORES_DISPONIVEIS = ["#7c5cff", "#4f8cff", "#14b8a6", "#f0577a", "#f5a623", "#22c55e"];
  const coresConfigEl = document.getElementById("coresConfig");
  CORES_DISPONIVEIS.forEach((cor) => {
    const b = document.createElement("button");
    b.className = "cor-swatch";
    b.style.background = cor;
    b.dataset.cor = cor;
    b.addEventListener("click", () => aplicarPreferencias({ cor }, true));
    coresConfigEl.appendChild(b);
  });

  document.getElementById("btnConfig").addEventListener("click", () => {
    const p = document.getElementById("painelConfig");
    p.style.display = p.style.display === "none" ? "flex" : "none";
  });
  document.getElementById("btnTemaClaro").addEventListener("click", () => aplicarPreferencias({ tema: "claro" }, true));
  document.getElementById("btnTemaEscuro").addEventListener("click", () => aplicarPreferencias({ tema: "escuro" }, true));

  function aplicarPreferencias(prefs, salvar) {
    if (prefs.tema) {
      document.body.classList.toggle("tema-claro", prefs.tema === "claro");
      document.getElementById("btnTemaClaro").classList.toggle("ativo", prefs.tema === "claro");
      document.getElementById("btnTemaEscuro").classList.toggle("ativo", prefs.tema !== "claro");
    }
    if (prefs.cor) {
      document.documentElement.style.setProperty("--accent", prefs.cor);
      [...coresConfigEl.children].forEach((b) => b.classList.toggle("ativa", b.dataset.cor === prefs.cor));
    }
    if (salvar && meuNome) {
      update(ref(db, `atendentes/${meuNome}/preferencias`), prefs);
    }
  }

  async function carregarMinhasPreferencias() {
    if (!meuNome) return;
    const snap = await get(ref(db, `atendentes/${meuNome}/preferencias`));
    const prefs = snap.val() || { tema: "escuro", cor: "#7c5cff" };
    aplicarPreferencias(prefs, false);
  }

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  const emailParaNome = {
    "giselearanha@brasiltecpar.com.br": "Gisele",
    "gabrielagarcia@brasiltecpar.com.br": "Gabriela",
    "karolinemoura@brasiltecpar.com.br": "Karoline",
  };
  const adminEmails = ["karolinenogueiramour89@gmail.com"];
  let meuNome = null;
  let souAdmin = false;

  const telaLoginEl   = document.getElementById("telaLogin");
  const appEl         = document.getElementById("app");
  const loginEmailEl  = document.getElementById("loginEmail");
  const loginSenhaEl  = document.getElementById("loginSenha");
  const btnEntrarEl   = document.getElementById("btnEntrar");
  const erroLoginEl   = document.getElementById("erroLogin");
  const usuarioLogadoEl = document.getElementById("usuarioLogado");
  const btnSairEl     = document.getElementById("btnSair");

  document.getElementById("btnMostrarSenha").addEventListener("click", () => {
    loginSenhaEl.type = loginSenhaEl.type === "password" ? "text" : "password";
  });

  btnEntrarEl.addEventListener("click", async () => {
    erroLoginEl.textContent = "";
    try {
      await signInWithEmailAndPassword(auth, loginEmailEl.value.trim(), loginSenhaEl.value);
    } catch (e) {
      erroLoginEl.textContent = "Email ou senha incorretos.";
    }
  });

  loginSenhaEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") btnEntrarEl.click();
  });

  btnSairEl.addEventListener("click", async () => {
    if (meuNome) {
      await update(ref(db, `atendentes/${meuNome}`), { status: "offline" });
    }
    await signOut(auth);
  });

  onAuthStateChanged(auth, (usuario) => {
    if (usuario) {
      telaLoginEl.style.display = "none";
      appEl.style.display = "block";
      usuarioLogadoEl.textContent = usuario.email;
      meuNome = emailParaNome[usuario.email] || null;
      souAdmin = adminEmails.includes(usuario.email);
      document.getElementById("painelAdmin").style.display = souAdmin ? "block" : "none";
      render();
      if (souAdmin) assinarStatsAdmin();
      if (meuNome) {
        carregarMinhasPreferencias();
        registrarPresencaNaFila();
      }

      if (meuNome) {
        const meuStatusRef = ref(db, `atendentes/${meuNome}/status`);
        const conectadoRef = ref(db, ".info/connected");
        onValue(conectadoRef, (snap) => {
          if (snap.val() === false) return;
          onDisconnect(meuStatusRef).set("offline").then(() => {
            update(ref(db, `atendentes/${meuNome}`), { status: "disponivel" });
          });
        });
      }
    } else {
      telaLoginEl.style.display = "block";
      appEl.style.display = "none";
      loginSenhaEl.value = "";
      meuNome = null;
      souAdmin = false;
      document.getElementById("painelAdmin").style.display = "none";
    }
  });

  const refOrdem      = ref(db, "fila/ordem");
  const refAtendentes = ref(db, "atendentes");

  // Todo dia a fila começa vazia; quem loga primeiro vira 1ª, quem loga
  // depois vai entrando atrás. Se a pessoa já logou hoje, mantém o lugar dela.
  async function registrarPresencaNaFila() {
    if (!meuNome) return;
    const hoje = dataHojeStr();
    await runTransaction(ref(db, "fila"), (filaAtual) => {
      if (!filaAtual || filaAtual.dataSessao !== hoje) {
        filaAtual = { ordem: [], dataSessao: hoje };
      }
      if (!filaAtual.ordem) filaAtual.ordem = [];
      if (!filaAtual.ordem.includes(meuNome)) {
        filaAtual.ordem = [...filaAtual.ordem, meuNome];
      }
      return filaAtual;
    });
  }

  const listaFilaEl = document.getElementById("listaFila");
  const historicoEl = document.getElementById("historico");
  const btnChamar   = document.getElementById("btnChamar");
  const toastEl     = document.getElementById("toast");

  let ordemAtual = [];
  let atendentesAtual = {};
  let contagemHoje = {};

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    clearTimeout(toast._t);
    toast._t = setTimeout(() => (toastEl.style.display = "none"), 2500);
  }

  function hueDoNome(nome) {
    let h = 0;
    for (let i = 0; i < nome.length; i++) h = (h * 31 + nome.charCodeAt(i)) % 360;
    return h;
  }
  function iniciais(nome) {
    return nome.trim().slice(0, 2).toUpperCase();
  }

  function render() {
    listaFilaEl.innerHTML = "";
    const proximaDisponivel = ordemAtual.find(
      (n) => atendentesAtual[n]?.status === "disponivel"
    );

    ordemAtual.forEach((nome, i) => {
      const info = atendentesAtual[nome] || { status: "offline" };
      const emVez = nome === proximaDisponivel;
      const qtdHoje = contagemHoje[nome] || 0;
      const div = document.createElement("div");
      div.className = `ticket ${info.status} ${emVez ? "destaque" : ""}`;
      const setasAdmin = souAdmin
        ? `<div class="ticket-setas">
             <button data-acao="subir" data-nome="${nome}" ${i === 0 ? "disabled" : ""}>▲</button>
             <button data-acao="descer" data-nome="${nome}" ${i === ordemAtual.length - 1 ? "disabled" : ""}>▼</button>
           </div>`
        : "";
      div.innerHTML = `
        ${setasAdmin}
        <span class="ticket-pos">${String(i + 1).padStart(2, "0")}</span>
        <div class="avatar" style="--hue:${hueDoNome(nome)}">${iniciais(nome)}</div>
        <div class="ticket-info">
          <div class="ticket-name">${nome}</div>
          <div class="ticket-meta">
            <span class="status-pill">${info.status === "disponivel" ? "disponível" : "offline"}</span>
            <span>· ${qtdHoje} hoje</span>
          </div>
        </div>
        <button data-acao="toggle" data-nome="${nome}">
          ${info.status === "offline" ? "Voltar" : "Pausar"}
        </button>
      `;
      listaFilaEl.appendChild(div);
    });

    const temDisponivel = !!proximaDisponivel;
    btnChamar.disabled = !temDisponivel;

    const minhaVezEl = document.getElementById("minhaVez");
    if (meuNome && proximaDisponivel === meuNome) {
      minhaVezEl.style.display = "flex";
    } else {
      minhaVezEl.style.display = "none";
    }
  }

  onValue(refOrdem, (snap) => {
    ordemAtual = snap.val() || [];
    render();
  });

  onValue(refAtendentes, (snap) => {
    atendentesAtual = snap.val() || {};
    render();
  });

  function dataHojeStr() {
    const d = new Date();
    const ano = d.getFullYear();
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const dia = String(d.getDate()).padStart(2, "0");
    return `${ano}-${mes}-${dia}`;
  }

  let dataExibida = null;
  let cancelarListenerHistorico = null;

  function assinarHistoricoDoDia() {
    if (cancelarListenerHistorico) cancelarListenerHistorico();
    dataExibida = dataHojeStr();
    const refHoje = ref(db, `historico/${dataExibida}`);
    cancelarListenerHistorico = onValue(refHoje, (snap) => {
      const dados = snap.val() || {};
      const itens = Object.values(dados)
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
        .slice(0, 30);

      contagemHoje = {};
      Object.values(dados).forEach((h) => {
        contagemHoje[h.atendente] = (contagemHoje[h.atendente] || 0) + 1;
      });

      historicoEl.innerHTML = itens.length
        ? itens.map((h) => {
            const hora = h.timestamp ? new Date(h.timestamp).toLocaleTimeString("pt-BR", {hour:"2-digit", minute:"2-digit"}) : "";
            return `<div class="historico-item"><span><b>${h.atendente}</b> puxou o atendimento</span><span class="hora">${hora}</span></div>`;
          }).join("")
        : `<div class="historico-vazio">Nenhuma chamada ainda hoje.</div>`;

      render();
    });
  }
  assinarHistoricoDoDia();

  setInterval(() => {
    if (dataHojeStr() !== dataExibida) assinarHistoricoDoDia();
  }, 60 * 1000);

  async function chamarProximo() {
    const atendentesSnap = await get(refAtendentes);
    const atendentes = atendentesSnap.val() || {};

    let nomeChamado = null;

    const resultado = await runTransaction(refOrdem, (ordem) => {
      if (!ordem) return ordem;
      let idx = -1;
      for (let i = 0; i < ordem.length; i++) {
        const nome = ordem[i];
        if (nome && atendentes[nome]?.status === "disponivel") {
          idx = i;
          break;
        }
      }
      if (idx === -1) {
        nomeChamado = null;
        return;
      }
      nomeChamado = ordem[idx];
      const nova = ordem.filter((_, i) => i !== idx);
      nova.push(nomeChamado);
      return nova;
    });

    if (!resultado.committed || !nomeChamado) {
      toast("Nenhum atendente disponível no momento.");
      return;
    }

    await push(ref(db, `historico/${dataHojeStr()}`), {
      atendente: nomeChamado,
      tipo: "chamada",
      timestamp: Date.now(),
    });

    toast(`${nomeChamado} foi chamada(o)!`);
  }

  async function alternarDisponibilidade(nome) {
    const atual = atendentesAtual[nome]?.status || "offline";
    const novoStatus = atual === "offline" ? "disponivel" : "offline";
    await update(ref(db, `atendentes/${nome}`), { status: novoStatus });
  }

  async function moverNaFila(nome, direcao) {
    await runTransaction(refOrdem, (ordem) => {
      if (!ordem) return ordem;
      const idx = ordem.indexOf(nome);
      const alvo = direcao === "subir" ? idx - 1 : idx + 1;
      if (idx === -1 || alvo < 0 || alvo >= ordem.length) return ordem;
      const nova = [...ordem];
      [nova[idx], nova[alvo]] = [nova[alvo], nova[idx]];
      return nova;
    });
  }

  async function passarAVez() {
    if (!meuNome) return;
    await runTransaction(refOrdem, (ordem) => {
      if (!ordem) return ordem;
      const idx = ordem.indexOf(meuNome);
      if (idx === -1) return ordem;
      const nova = ordem.filter((_, i) => i !== idx);
      nova.push(meuNome);
      return nova;
    });
    toast("Você passou a vez.");
  }
  document.getElementById("btnPassarVez").addEventListener("click", passarAVez);

  // ---------- Painel administrativo: todos os dias, todos os totais ----------
  let cancelarStatsAdmin = null;
  function assinarStatsAdmin() {
    if (cancelarStatsAdmin) return;
    cancelarStatsAdmin = onValue(ref(db, "historico"), (snap) => {
      const todosDias = snap.val() || {};
      const totalPorPessoa = {};
      const porDia = [];

      Object.entries(todosDias).forEach(([data, entradas]) => {
        const contagens = {};
        Object.values(entradas).forEach((h) => {
          contagens[h.atendente] = (contagens[h.atendente] || 0) + 1;
          totalPorPessoa[h.atendente] = (totalPorPessoa[h.atendente] || 0) + 1;
        });
        porDia.push({ data, contagens });
      });
      porDia.sort((a, b) => b.data.localeCompare(a.data));

      const statsEl = document.getElementById("statsAdmin");
      const totaisHtml = Object.entries(totalPorPessoa)
        .sort((a, b) => b[1] - a[1])
        .map(([nome, qtd]) => `
          <div class="admin-total-row">
            <span><b>${nome}</b></span>
            <span>${qtd} atendimento(s) no total</span>
          </div>
        `).join("") || `<div class="historico-vazio">Ainda sem registros.</div>`;

      const porDiaHtml = porDia.map((d) => `
        <div class="admin-dia">${d.data}</div>
        ${Object.entries(d.contagens).map(([nome, qtd]) => `
          <div class="admin-total-row"><span>${nome}</span><span>${qtd}</span></div>
        `).join("")}
      `).join("");

      statsEl.innerHTML = `${totaisHtml}${porDiaHtml}`;
    });
  }

  btnChamar.addEventListener("click", chamarProximo);

  listaFilaEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-acao]");
    if (!btn) return;
    const { acao, nome } = btn.dataset;
    if (acao === "toggle") alternarDisponibilidade(nome);
    if (acao === "subir") moverNaFila(nome, "subir");
    if (acao === "descer") moverNaFila(nome, "descer");
  });
</script>
</body>
</html>

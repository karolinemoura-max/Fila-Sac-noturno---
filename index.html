<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fila Noturno SAC — Rodízio</title>
<style>
  :root{
    --bg:#0f1720; --card:#182231; --card2:#1f2c3d;
    --text:#e7edf5; --muted:#8fa1b8;
    --ok:#3ecf8e; --busy:#f2b84b; --off:#5b6b80;
    --accent:#4f8cff; --danger:#e0556f;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg); color:var(--text); padding:24px;
  }
  h1{font-size:20px; margin:0 0 4px;}
  .sub{color:var(--muted); font-size:13px; margin-bottom:24px;}
  .grid{display:grid; grid-template-columns: 1fr 1fr; gap:20px; max-width:1000px;}
  @media(max-width:720px){ .grid{grid-template-columns:1fr;} }
  .card{background:var(--card); border-radius:var(--radius); padding:18px;}
  .card h2{font-size:14px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); margin:0 0 14px;}
  .fila-item{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--card2); border-radius:10px; padding:10px 14px; margin-bottom:8px;
  }
  .fila-item .pos{color:var(--muted); font-size:12px; width:22px;}
  .status-dot{width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:8px;}
  .disponivel .status-dot{background:var(--ok);}
  .ocupado .status-dot{background:var(--busy);}
  .offline .status-dot{background:var(--off);}
  .nome{font-weight:600;}
  .meta{color:var(--muted); font-size:12px;}
  button{
    border:none; border-radius:8px; padding:7px 12px; font-size:12px; cursor:pointer;
    font-weight:600; color:#fff;
  }
  button.primary{background:var(--accent);}
  button.ghost{background:transparent; border:1px solid var(--muted); color:var(--muted);}
  button:disabled{opacity:.4; cursor:not-allowed;}
  .chamar-btn{
    width:100%; padding:14px; font-size:15px; background:var(--accent); border-radius:10px; margin-bottom:18px;
  }
  .chamar-btn:hover:not(:disabled){filter:brightness(1.1);}
  .historico{max-height:220px; overflow-y:auto;}
  .historico-item{font-size:12px; color:var(--muted); padding:6px 0; border-bottom:1px solid #24334580;}
  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    background:var(--card2); padding:10px 18px; border-radius:8px; font-size:13px;
    display:none; box-shadow:0 4px 14px rgba(0,0,0,.4);
  }
  .actions{display:flex; gap:6px;}

  /* Tela de login */
  #telaLogin{
    max-width:340px; margin:80px auto 0; background:var(--card);
    border-radius:var(--radius); padding:28px;
  }
  #telaLogin h1{margin-bottom:18px;}
  #telaLogin input{
    width:100%; padding:11px 12px; margin-bottom:10px; border-radius:8px;
    border:1px solid #2a3a4d; background:var(--card2); color:var(--text); font-size:14px;
  }
  #telaLogin button{width:100%; padding:11px; font-size:14px; background:var(--accent);}
  #erroLogin{color:var(--danger); font-size:12px; margin-top:8px; min-height:16px;}
  .topo-logado{
    display:flex; justify-content:space-between; align-items:center;
    max-width:1000px; margin-bottom:18px;
  }
  .topo-logado span{color:var(--muted); font-size:13px;}
  #btnSair{background:transparent; border:1px solid var(--muted); color:var(--muted);}
  #minhaVez{
    max-width:1000px; background:var(--ok); color:#08211a; font-weight:700;
    padding:14px 18px; border-radius:10px; margin-bottom:18px; font-size:15px;
  }
</style>
</head>
<body>

<!-- Tela de login (some depois que loga) -->
<div id="telaLogin">
  <h1>Fila Noturno SAC</h1>
  <input type="email" id="loginEmail" placeholder="Email" autocomplete="username" autocapitalize="off">
  <div style="position:relative;">
    <input type="password" id="loginSenha" placeholder="Senha" autocomplete="current-password" autocapitalize="off" style="padding-right:40px;">
    <button type="button" id="btnMostrarSenha" style="position:absolute; right:4px; top:4px; background:transparent; padding:6px 8px; font-size:16px;">👁</button>
  </div>
  <button id="btnEntrar">Entrar</button>
  <div id="erroLogin"></div>
</div>

<!-- App (só aparece depois de logar) -->
<div id="app" style="display:none;">
<div class="topo-logado">
  <div>
    <h1>Fila Noturno SAC</h1>
    <div class="sub">Rodízio de atendimento — Firebase Realtime Database</div>
  </div>
  <div>
    <span id="usuarioLogado"></span>
    <button id="btnSair">Sair</button>
  </div>
</div>

<div id="minhaVez" style="display:none;"></div>

<div class="grid">
  <div class="card">
    <h2>Ordem da fila</h2>
    <button class="chamar-btn" id="btnChamar">Chamar próximo disponível</button>
    <div id="listaFila"></div>
  </div>

  <div class="card">
    <h2>Histórico recente</h2>
    <div class="historico" id="historico"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>
<!-- fim da div #app -->

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import {
    getDatabase, ref, onValue, get, update, push,
    runTransaction, serverTimestamp, onDisconnect
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";
  import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBHNeQ-m8aRgsldPZYq55YMmE5FOCPGFBU",
    authDomain: "fila-noturno-sac.firebaseapp.com",
    databaseURL: "https://fila-noturno-sac-default-rtdb.firebaseio.com",
    projectId: "fila-noturno-sac",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);

  // Liga o email de login ao nome usado na fila
  const emailParaNome = {
    "giselearanha@brasiltecpar.com.br": "Gisele",
    "gabrielagarcia@brasiltecpar.com.br": "Gabriela",
    "karolinemoura@brasiltecpar.com.br": "Karoline",
  };
  let meuNome = null;

  // ---------- Login / Logout ----------
  const telaLoginEl   = document.getElementById("telaLogin");
  const appEl         = document.getElementById("app");
  const loginEmailEl  = document.getElementById("loginEmail");
  const loginSenhaEl  = document.getElementById("loginSenha");
  const btnEntrarEl   = document.getElementById("btnEntrar");
  const erroLoginEl   = document.getElementById("erroLogin");
  const usuarioLogadoEl = document.getElementById("usuarioLogado");
  const btnSairEl     = document.getElementById("btnSair");

  document.getElementById("btnMostrarSenha").addEventListener("click", () => {
    const campo = loginSenhaEl;
    campo.type = campo.type === "password" ? "text" : "password";
  });

  btnEntrarEl.addEventListener("click", async () => {
    erroLoginEl.textContent = "";
    try {
      await signInWithEmailAndPassword(auth, loginEmailEl.value.trim(), loginSenhaEl.value);
    } catch (e) {
      erroLoginEl.textContent = "Email ou senha incorretos.";
    }
  });

  // Permite apertar Enter no campo de senha pra logar
  loginSenhaEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") btnEntrarEl.click();
  });

  btnSairEl.addEventListener("click", async () => {
    if (meuNome) {
      await update(ref(db, `atendentes/${meuNome}`), { status: "offline" });
    }
    await signOut(auth);
  });

  onAuthStateChanged(auth, (usuario) => {
    if (usuario) {
      telaLoginEl.style.display = "none";
      appEl.style.display = "block";
      usuarioLogadoEl.textContent = usuario.email;
      meuNome = emailParaNome[usuario.email] || null;
      render();

      // Assim que loga, fica "disponivel" automaticamente.
      // Se a conexão cair (fechar aba, sem internet) sem apertar Sair,
      // o Firebase marca "offline" sozinho.
      if (meuNome) {
        const meuStatusRef = ref(db, `atendentes/${meuNome}/status`);
        const conectadoRef = ref(db, ".info/connected");
        onValue(conectadoRef, (snap) => {
          if (snap.val() === false) return;
          onDisconnect(meuStatusRef).set("offline").then(() => {
            update(ref(db, `atendentes/${meuNome}`), { status: "disponivel" });
          });
        });
      }
    } else {
      telaLoginEl.style.display = "block";
      appEl.style.display = "none";
      loginSenhaEl.value = "";
      meuNome = null;
    }
  });

  const refOrdem      = ref(db, "fila/ordem");
  const refAtendentes = ref(db, "atendentes");

  const listaFilaEl = document.getElementById("listaFila");
  const historicoEl = document.getElementById("historico");
  const btnChamar   = document.getElementById("btnChamar");
  const toastEl     = document.getElementById("toast");

  let ordemAtual = [];
  let atendentesAtual = {};

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.style.display = "block";
    clearTimeout(toast._t);
    toast._t = setTimeout(() => (toastEl.style.display = "none"), 2500);
  }

  // ---------- Renderização em tempo real ----------
  function render() {
    listaFilaEl.innerHTML = "";
    ordemAtual.forEach((nome, i) => {
      const info = atendentesAtual[nome] || { status: "offline", atendimentos: 0 };
      const div = document.createElement("div");
      div.className = `fila-item ${info.status}`;
      div.innerHTML = `
        <div>
          <span class="pos">${i + 1}º</span>
          <span class="status-dot"></span>
          <span class="nome">${nome}</span>
          <div class="meta">${info.status} · ${info.atendimentos || 0} atendimento(s)</div>
        </div>
        <div class="actions">
          <button class="ghost" data-acao="toggle" data-nome="${nome}">
            ${info.status === "offline" ? "Voltar" : "Pausar"}
          </button>
        </div>
      `;
      listaFilaEl.appendChild(div);
    });

    const temDisponivel = ordemAtual.some(
      (n) => atendentesAtual[n]?.status === "disponivel"
    );
    btnChamar.disabled = !temDisponivel;

    // Verifica se sou eu a próxima disponível da fila
    const minhaVezEl = document.getElementById("minhaVez");
    const proximaDisponivel = ordemAtual.find(
      (n) => atendentesAtual[n]?.status === "disponivel"
    );
    if (meuNome && proximaDisponivel === meuNome) {
      minhaVezEl.textContent = "🔔 Agora é a sua vez!";
      minhaVezEl.style.display = "block";
    } else {
      minhaVezEl.style.display = "none";
    }
  }

  onValue(refOrdem, (snap) => {
    ordemAtual = snap.val() || [];
    render();
  });

  onValue(refAtendentes, (snap) => {
    atendentesAtual = snap.val() || {};
    render();
  });

  // ---------- Histórico por dia (reseta sozinho todo dia, sem precisar de robô/servidor) ----------
  function dataHojeStr() {
    const d = new Date();
    const ano = d.getFullYear();
    const mes = String(d.getMonth() + 1).padStart(2, "0");
    const dia = String(d.getDate()).padStart(2, "0");
    return `${ano}-${mes}-${dia}`;
  }

  let dataExibida = null;
  let cancelarListenerHistorico = null;

  function assinarHistoricoDoDia() {
    if (cancelarListenerHistorico) cancelarListenerHistorico();
    dataExibida = dataHojeStr();
    const refHoje = ref(db, `historico/${dataExibida}`);
    cancelarListenerHistorico = onValue(refHoje, (snap) => {
      const dados = snap.val() || {};
      const itens = Object.values(dados)
        .sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0))
        .slice(0, 30);
      historicoEl.innerHTML = itens
        .map((h) => {
          const data = h.timestamp ? new Date(h.timestamp).toLocaleTimeString("pt-BR") : "";
          return `<div class="historico-item"><b>${h.atendente}</b> puxou o atendimento às ${data}</div>`;
        })
        .join("");
    });
  }
  assinarHistoricoDoDia();

  // Verifica de tempo em tempo se virou o dia (importante pro turno da noite,
  // que passa da meia-noite com o app aberto) e troca o histórico exibido sozinho
  setInterval(() => {
    if (dataHojeStr() !== dataExibida) assinarHistoricoDoDia();
  }, 60 * 1000);

  // ---------- Ações ----------

  // Chama o próximo atendente DISPONÍVEL e o move para o fim da fila
  async function chamarProximo() {
    const atendentesSnap = await get(refAtendentes);
    const atendentes = atendentesSnap.val() || {};

    let nomeChamado = null;

    const resultado = await runTransaction(refOrdem, (ordem) => {
      if (!ordem) return ordem;
      let idx = -1;
      for (let i = 0; i < ordem.length; i++) {
        const nome = ordem[i];
        if (nome && atendentes[nome]?.status === "disponivel") {
          idx = i;
          break;
        }
      }
      if (idx === -1) {
        nomeChamado = null;
        return; // aborta a transação, ninguém disponível
      }
      nomeChamado = ordem[idx];
      const nova = ordem.filter((_, i) => i !== idx);
      nova.push(nomeChamado);
      return nova;
    });

    if (!resultado.committed || !nomeChamado) {
      toast("Nenhum atendente disponível no momento.");
      return;
    }

    await update(ref(db, `atendentes/${nomeChamado}`), {
      atendimentos: (atendentes[nomeChamado]?.atendimentos || 0) + 1,
    });

    await push(ref(db, `historico/${dataHojeStr()}`), {
      atendente: nomeChamado,
      tipo: "chamada",
      timestamp: Date.now(),
    });

    toast(`${nomeChamado} foi chamada(o)!`);
  }

  // Pausa (offline) ou volta (disponivel) um atendente, sem tirar/reordenar quem não mudou
  async function alternarDisponibilidade(nome) {
    const atual = atendentesAtual[nome]?.status || "offline";
    const novoStatus = atual === "offline" ? "disponivel" : "offline";
    await update(ref(db, `atendentes/${nome}`), { status: novoStatus });
  }

  btnChamar.addEventListener("click", chamarProximo);

  listaFilaEl.addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-acao]");
    if (!btn) return;
    const { acao, nome } = btn.dataset;
    if (acao === "toggle") alternarDisponibilidade(nome);
  });
</script>
</body>
</html>
